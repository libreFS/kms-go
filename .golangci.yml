version: "2"

linters:
  default: none
  enable:
    - gofumpt
    - goimports
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - prealloc
    - unconvert
    - unused
  settings:
    misspell:
      locale: US
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1005
        - -ST1016
        - -ST1020
        - -ST1021
  exclusions:
    rules:
      - path: (.+)\.go$
        text: "var-naming: don't use ALL_CAPS"
      - path: (.+)\.go$
        text: "package-comments:"

issues:
  max-issues-per-linter: 100
  max-same-issues: 100
