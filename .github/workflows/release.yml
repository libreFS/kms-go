name: Release

on:
  push:
    tags:
      - "kms/v*"
      - "kes/v*"

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          check-latest: true

      - name: Build
        run: go build ./kms/... ./kes/...

      - name: Test
        run: go test -race -short ./kms/... ./kes/...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
